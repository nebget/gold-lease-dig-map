<!doctype html>
<html lang="am">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>የወርቅ መቆፈሪያ ካርታ</title>
  <link rel="stylesheet" href="assets/leaflet.css">
  <style>
    * { box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; margin: 0; }
    body { font-family: Kefa, 'Geeza Pro', Inter, system-ui, -apple-system, sans-serif; background: #111; color: #111; }
    #map { position: fixed; inset: 0; }
    .panel {
      position: fixed;
      left: 10px;
      right: 10px;
      top: calc(10px + env(safe-area-inset-top));
      z-index: 500;
      background: rgba(255, 250, 240, 0.94);
      border: 2px solid #111;
      border-radius: 8px;
      padding: 8px 9px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.28);
    }
    h1 { margin: 0 0 4px; font-size: 17px; line-height: 1.05; letter-spacing: 0; }
    .instruction { margin: 0; font-size: 14px; line-height: 1.18; }
    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 10px;
      margin-top: 6px;
      font-size: 12px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .dot { width: 13px; height: 13px; display: inline-block; border: 1px solid #111; }
    .status {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 500;
      background: rgba(24,32,22,0.92);
      color: #fff;
      border-radius: 8px;
      padding: 8px 9px;
      font-size: 13px;
      line-height: 1.25;
      box-shadow: 0 3px 12px rgba(0,0,0,0.28);
    }
    .status button {
      width: 100%;
      margin-top: 7px;
      border: 0;
      border-radius: 7px;
      background: #fff;
      color: #111;
      font-size: 15px;
      font-weight: 800;
      padding: 10px;
    }
    .leaflet-top { top: 118px; }
    .leaflet-control-attribution { font-size: 9px; }
    @media (min-width: 760px) {
      .panel { left: 14px; right: auto; width: 360px; }
      .status { left: 14px; right: auto; width: 360px; }
      .leaflet-top { top: 10px; left: 380px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <section class="panel">
    <h1>የወርቅ መቆፈሪያ ካርታ</h1>
    <p class="instruction"><strong>ቢጫ ጀምር።</strong> ቀጥሎ ብርቱካናማ። ፈዛዛ ቢጫ መጨረሻ። ቀይ አትቆፍር።</p>
    <div class="legend">
      <span><i class="dot" style="background:#f1b51c"></i>መጀመሪያ</span>
      <span><i class="dot" style="background:#f68824"></i>ሁለተኛ</span>
      <span><i class="dot" style="background:#ffec8f"></i>መጨረሻ</span>
      <span><i class="dot" style="background:#b73228"></i>አትቆፍር</span>
      <span><i class="dot" style="background:#488cff"></i>ማጠቢያ</span>
      <span><i class="dot" style="background:#0078ff"></i>ውሃ</span>
    </div>
  </section>
  <div class="status" id="status">
    ሰማያዊ ነጥብዎን ለማየት ይጫኑ።
    <button id="locateButton" type="button">ቦታን አብራ</button>
  </div>
  <script src="assets/leaflet.js"></script>
  <script>
    const ui = {"html_lang": "am", "title": "የወርቅ መቆፈሪያ ካርታ", "instruction": "<strong>ቢጫ ጀምር።</strong> ቀጥሎ ብርቱካናማ። ፈዛዛ ቢጫ መጨረሻ። ቀይ አትቆፍር።", "first": "መጀመሪያ", "second": "ሁለተኛ", "last_test": "መጨረሻ", "avoid": "አትቆፍር", "plant": "ማጠቢያ", "drainage": "ውሃ", "turning_on": "ቦታዎን እያበራን ነው...", "button": "ቦታን አብራ", "tap_for_location": "ሰማያዊ ነጥብዎን ለማየት ይጫኑ።", "you_are_here": "እዚህ ነዎት", "location_on": "ቦታ በርቷል። ትክክለኛነት", "meters": "ሜትር", "recenter": "ቦታዬን አሳይ", "no_geo": "ይህ ስልክ ቦታ ማሳየትን አይደግፍም።", "needs_https": "ቦታ ለማሳየት የHTTPS ሊንክ ያስፈልጋል።", "allow": "ስልኩ ሲጠይቅ ቦታን ፍቀድ።", "location_off": "ቦታ አልተከፈተም:", "try_again": "እንደገና ሞክር", "permission_help": "ሰማያዊ ነጥብ ካልታየ፣ ሊንኩን በSafari ወይም Chrome ይክፈቱ እና ቦታ መጠቀምን ይፍቀዱ።", "map_layer": "የካርታ ምልክት", "layer_names": {"dig_first": "መጀመሪያ ቆፍር", "dig_second": "ሁለተኛ ቆፍር", "dig_third": "መጨረሻ ሙከራ", "avoid": "አትቆፍር", "avoid_wet": "አትቆፍር", "stage": "ማጠቢያ", "tailings": "ማረጋጊያ", "drainage": "የውሃ መስመር", "old_channel": "የቀድሞ ውሃ መስመር", "access": "የመኪና መንገድ", "water": "የውሃ መስመር", "water_point": "ውሃ መመልከቻ", "stage_point": "ማጠቢያ", "lease": "የቦታ ድንበር"}};
    const data = {"type": "FeatureCollection", "features": [{"type": "Feature", "properties": {"name": "Lease boundary", "class": "lease", "confidence": "High"}, "geometry": {"type": "Polygon", "coordinates": [[[34.96008333333334, 10.216277777777776], [34.96255555555556, 10.216583333333332], [34.96280555555556, 10.217805555555556], [34.96227777777778, 10.218361111111111], [34.959944444444446, 10.21813888888889], [34.96008333333334, 10.216277777777776]]]}}, {"type": "Feature", "properties": {"name": "Visible seasonal drainage / active low strip", "class": "drainage", "confidence": "Medium", "why": "High-resolution imagery shows a green, low, wet-looking belt along the southern half of the lease. OSM does not map it, so treat it as a seasonal swale/channel until checked on foot.", "field_action": "Walk it first. Dig the edges and bottom contact, not the soft wet channel center."}, "geometry": {"type": "LineString", "coordinates": [[34.9587, 10.21608], [34.95925, 10.21642], [34.9599, 10.2167], [34.96065, 10.21685], [34.96135, 10.21686], [34.96205, 10.21674], [34.96262, 10.21656], [34.96318, 10.21622]]}}, {"type": "Feature", "properties": {"name": "DIG FIRST - southeast channel-edge trap", "class": "dig_first", "priority": "1", "confidence": "Medium", "why": "Best combination of visible drainage, lower ground, nearby bend/constriction, road access, and short haul to the wash plant.", "field_action": "Open narrow cross-cuts from the dry edge toward the channel. Pan bottom gravel, black sand, clay contact, and cracks separately."}, "geometry": {"type": "Polygon", "coordinates": [[[34.96162, 10.21658], [34.96247, 10.21658], [34.96262, 10.21704], [34.96214, 10.21725], [34.96152, 10.21712], [34.96162, 10.21658]]]}}, {"type": "Feature", "properties": {"name": "DIG SECOND - central/west swale edge", "class": "dig_second", "priority": "2", "confidence": "Medium", "why": "Likely continuation of the same low-energy swale. It can hold a second pay streak if coarse gravel or hardpan appears under the vegetation line.", "field_action": "Move here only after the first zone gives color. Keep the same bucket-count test so the comparison is fair."}, "geometry": {"type": "Polygon", "coordinates": [[[34.96008, 10.21662], [34.96102, 10.21672], [34.96135, 10.21716], [34.96066, 10.21738], [34.96004, 10.2172], [34.96008, 10.21662]]]}}, {"type": "Feature", "properties": {"name": "DIG THIRD - possible old terrace lens", "class": "dig_third", "priority": "3", "confidence": "Low-Medium", "why": "Paler, slightly higher ground may be old flood gravel or may just be dry overburden. It is a test target, not a production target yet.", "field_action": "Make one trench to clay/hardpan. Abandon fast if it is fine soil with no rounded gravel or black sand."}, "geometry": {"type": "Polygon", "coordinates": [[[34.96042, 10.21748], [34.96136, 10.2175], [34.96154, 10.21794], [34.96056, 10.21808], [34.96012, 10.21782], [34.96042, 10.21748]]]}}, {"type": "Feature", "properties": {"name": "AVOID - dry high overburden unless panning proves it", "class": "avoid", "confidence": "Medium", "why": "Less visible channel evidence. Likely higher/drier pasture and overburden relative to the drainage trap.", "field_action": "Do not spend excavator hours here until the three priority zones are tested."}, "geometry": {"type": "Polygon", "coordinates": [[[34.9612, 10.21802], [34.9622, 10.21828], [34.96255, 10.218], [34.9622, 10.21776], [34.96158, 10.21788], [34.9612, 10.21802]]]}}, {"type": "Feature", "properties": {"name": "AVOID - wet/loose channel center", "class": "avoid_wet", "confidence": "Medium", "why": "Loose recent sand and thick vegetation are poor places to widen blindly and are higher flood/instability risk.", "field_action": "Dig the edges and bottom contact. Do not dump tailings into this line."}, "geometry": {"type": "Polygon", "coordinates": [[[34.9592, 10.21634], [34.96012, 10.21645], [34.96128, 10.21652], [34.96236, 10.21642], [34.9625, 10.21667], [34.96135, 10.21683], [34.96026, 10.21678], [34.95922, 10.21658], [34.9592, 10.21634]]]}}, {"type": "Feature", "properties": {"name": "Wash plant staging pad", "class": "stage", "confidence": "Medium", "why": "Close to the east road/track and close to the first dig, but set back from the wet channel center.", "field_action": "Place plant on compact dry ground. Keep the pump line short and keep equipment out of soft bank material."}, "geometry": {"type": "Polygon", "coordinates": [[[34.96218, 10.21719], [34.9626, 10.21723], [34.96262, 10.21754], [34.96224, 10.21758], [34.96218, 10.21719]]]}}]};
    const mapBounds = [[10.21407778, 34.95744444], [10.22056111, 34.96530556]];
    const map = L.map('map', { zoomControl: true, maxBounds: mapBounds, maxBoundsViscosity: 0.55 }).setView([10.21743333, 34.96153333], 17);
    L.imageOverlay('assets/esri_world_imagery_tight.png', mapBounds, { opacity: 1 }).addTo(map);
    map.setMaxZoom(20);
    map.setMinZoom(15);

    
    function styleFeature(feature) {
      const cls = feature.properties.class;
      if (cls === 'lease') return { color: '#ffe000', weight: 4, fillColor: '#ffcc00', fillOpacity: 0.10 };
      if (cls === 'dig_first') return { color: '#ffffff', weight: 3, fillColor: '#f1b51c', fillOpacity: 0.62 };
      if (cls === 'dig_second') return { color: '#ffffff', weight: 3, fillColor: '#f68824', fillOpacity: 0.48 };
      if (cls === 'dig_third') return { color: '#ffffff', weight: 3, fillColor: '#ffec8f', fillOpacity: 0.42 };
      if (cls === 'avoid') return { color: '#b73228', weight: 2, fillColor: '#b73228', fillOpacity: 0.34 };
      if (cls === 'avoid_wet') return { color: '#7d2119', weight: 2, fillColor: '#7d2119', fillOpacity: 0.24, dashArray: '7,5' };
      if (cls === 'stage') return { color: '#3269e6', weight: 3, fillColor: '#488cff', fillOpacity: 0.46 };
      if (cls === 'tailings') return { color: '#533d2a', weight: 3, fillColor: '#846848', fillOpacity: 0.50 };
      if (cls === 'drainage') return { color: '#0078ff', weight: 5, opacity: 0.95 };
      if (cls === 'old_channel') return { color: '#00bfd7', weight: 4, opacity: 0.9, dashArray: '8,6' };
      if (cls === 'access') return { color: '#ffffff', weight: 6, opacity: 0.95 };
      if (cls === 'water') return { color: '#0055ff', weight: 3, opacity: 0.9, dashArray: '5,5' };
      if (cls === 'osm_road') return { color: '#f5f0e6', weight: 2, opacity: 0.72 };
      if (cls === 'osm_stream') return { color: '#0077c8', weight: 3, opacity: 0.75 };
      return { color: '#333', weight: 2 };
    }
    

    function pointToLayer(feature, latlng) {
      const cls = feature.properties.class;
      if (cls === 'corner') return L.circleMarker(latlng, { radius: 5, color: '#111', weight: 2, fillColor: '#23d376', fillOpacity: 1 });
      if (cls === 'stage_point' || cls === 'water_point') return L.circleMarker(latlng, { radius: 8, color: '#fff', weight: 2, fillColor: '#3269e6', fillOpacity: 1 });
      return L.circleMarker(latlng, { radius: 6, color: '#111', weight: 2, fillColor: '#fff', fillOpacity: 1 });
    }

    const layers = L.geoJSON(data, {
      style: styleFeature,
      pointToLayer,
      onEachFeature: (feature, layer) => {
        const p = feature.properties || {};
        const label = ui.layer_names[p.class] || p.name || ui.map_layer;
        layer.bindPopup(`<strong>${label}</strong>`);
      }
    }).addTo(map);
    map.fitBounds(layers.getBounds().pad(0.12));

    const status = document.getElementById('status');
    const locateButton = document.getElementById('locateButton');
    let locationMarker = null;
    let accuracyCircle = null;
    let watchId = null;

    function showLocation(lat, lon, accuracy) {
      const latlng = [lat, lon];
      if (!locationMarker) {
        locationMarker = L.circleMarker(latlng, {
          radius: 10,
          color: '#ffffff',
          weight: 4,
          fillColor: '#1769ff',
          fillOpacity: 1
        }).addTo(map).bindPopup(ui.you_are_here);
      } else {
        locationMarker.setLatLng(latlng);
      }
      if (!accuracyCircle) {
        accuracyCircle = L.circle(latlng, {
          radius: accuracy || 20,
          color: '#1769ff',
          weight: 1,
          fillColor: '#1769ff',
          fillOpacity: 0.14
        }).addTo(map);
      } else {
        accuracyCircle.setLatLng(latlng);
        accuracyCircle.setRadius(accuracy || 20);
      }
      map.setView(latlng, Math.max(map.getZoom(), 18));
      status.firstChild.textContent = `${ui.location_on} ${Math.round(accuracy || 0)} ${ui.meters}. `;
      locateButton.textContent = ui.recenter;
    }

    function startLocation() {
      if (!navigator.geolocation) {
        status.firstChild.textContent = `${ui.no_geo} `;
        return;
      }
      if (!window.isSecureContext) {
        status.firstChild.textContent = `${ui.needs_https} `;
        return;
      }
      status.firstChild.textContent = `${ui.allow} `;
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(
        pos => showLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
        err => {
          status.firstChild.textContent = `${ui.permission_help} `;
          locateButton.textContent = ui.try_again;
        },
        { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
      );
    }

    locateButton.addEventListener('click', startLocation);
    window.addEventListener('load', () => setTimeout(startLocation, 500));
  </script>
</body>
</html>
